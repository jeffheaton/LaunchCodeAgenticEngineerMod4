name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  change-type-check:
    name: Change Classifier
    runs-on: ubuntu-latest
    outputs:
      touches-policy: ${{ steps.classify.outputs.touches-policy }}
      changed-files: ${{ steps.classify.outputs.changed-files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: classify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          echo "changed-files=$CHANGED" >> $GITHUB_OUTPUT
          if echo "$CHANGED" | grep -qE '(docs/governance-policy\.md|mcp-servers/.*/allow-list\.json|scripts/run-agent\.sh|\.skills/)'; then
            echo "touches-policy=true" >> $GITHUB_OUTPUT
          else
            echo "touches-policy=false" >> $GITHUB_OUTPUT
          fi

  policy-gate:
    name: Policy Test Suite
    runs-on: ubuntu-latest
    needs: change-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest pytest-json-report PyYAML
      - name: Run policy tests
        run: |
          mkdir -p ci-artifacts
          python -m pytest eval/test_policy.py -v \
            --json-report --json-report-file=ci-artifacts/policy-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: policy-report
          path: ci-artifacts/policy-report.json

  eval-gate:
    name: Evaluation Harness
    runs-on: ubuntu-latest
    needs: change-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest pytest-json-report PyYAML
      - name: Run deterministic tests
        run: |
          mkdir -p ci-artifacts
          python -m pytest \
            eval/test_deterministic_router.py \
            eval/test_deterministic_step.py \
            eval/test_deterministic.py \
            -v --json-report --json-report-file=ci-artifacts/deterministic-report.json
      - name: Run rubric suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m pytest eval/test_rubric_suite.py -v \
            --json-report --json-report-file=ci-artifacts/rubric-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-reports
          path: ci-artifacts/

  pipeline-integrity:
    name: Pipeline Integrity Check
    runs-on: ubuntu-latest
    needs: change-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install PyYAML
      - name: Check pipeline integrity
        run: python3 scripts/check-pipeline-integrity.py

  advisory-review:
    name: Advisory Code Review
    runs-on: ubuntu-latest
    needs: change-type-check
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run reviewer
        env:
          CHANGED_FILES: ${{ needs.change-type-check.outputs.changed-files }}
        run: |
          mkdir -p ci-artifacts
          python3 scripts/run-reviewer.py
          [ -d ci-out ] && cp -r ci-out/. ci-artifacts/ || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-output
          path: ci-artifacts/

  audit-trail:
    name: Audit Trail
    runs-on: ubuntu-latest
    needs: [change-type-check, policy-gate, eval-gate, pipeline-integrity, advisory-review]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ci-artifacts
          merge-multiple: true
      - name: Build audit trail
        run: |
          python3 scripts/build-audit-trail.py \
            --sha "${{ github.sha }}" \
            --pr "${{ github.event.pull_request.number || '0' }}" \
            --touches-policy "${{ needs.change-type-check.outputs.touches-policy || 'false' }}" \
            --artifacts ci-artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: audit-trail
          path: ci-audit-trail-*.json
